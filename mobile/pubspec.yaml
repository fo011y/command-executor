name: gcbconnect
description: GCB Connect - Remote Car Control

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.0

  # WebSocket / Socket.io
  socket_io_client: ^2.0.3+1

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
